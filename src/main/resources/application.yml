spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/influ_match
    username: postgres
    password: secret123

  jpa:
    hibernate:
      ddl-auto: update     
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        physical_naming_strategy: com.influmatch.shared.infrastructure.SnakePluralNamingStrategy

  flyway:
    baseline-on-migrate: true
    enabled: false

# ─── Swagger / OpenAPI ───
springdoc:
  api-docs:
    path: /api/docs           # <- ahora el JSON está aquí
  swagger-ui:
    path: /api/swagger        # <- UI accesible en http://localhost:8080/api/swagger
